apiVersion: apps/v1
kind: Deployment
metadata:
  name: maie-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: maie-api
  template:
    metadata:
      labels:
        app: maie-api
    spec:
      containers:
        - name: maie-api
          image: ghcr.io/anudeep/multi-agent-intelligence-engine:2.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: maie-config
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
          volumeMounts:
            - name: maie-state
              mountPath: /var/lib/maie
      volumes:
        - name: maie-state
          emptyDir: {}

