version: "3.9"

services:
  maie-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: maie-api
    env_file:
      - .env
    environment:
      APP_ENV: local
      API_HOST: 0.0.0.0
      API_PORT: 8080
      CHECKPOINT_DIR: /app/.maie/checkpoints
      USE_MOCK_PROVIDERS: "true"
    ports:
      - "8080:8080"
    volumes:
      - ./.maie:/app/.maie

